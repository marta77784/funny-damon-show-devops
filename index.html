<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Analytics Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: white; padding: 30px; }
        h1 { text-align: center; font-size: 2em; margin-bottom: 10px; color: #fff; }
        .updated { text-align: center; color: #aaa; margin-bottom: 30px; }
        .channel-card { background: #1a1a1a; border-radius: 15px; padding: 30px; margin: 20px auto; max-width: 700px; }
        h2 { font-size: 1.8em; margin-bottom: 20px; }
        .stats-grid { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; }
        .stat { text-align: center; }
        .number { font-size: 2em; font-weight: bold; }
        .label { color: #aaa; margin-top: 8px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>📊 YouTube Analytics</h1>
    <p class="updated">Updated: 2026-03-22 22:21</p>
    
    <div class="channel-card">
        <h2 style="color:#ff0000">Funny Damon Show</h2>
        <div class="stats-grid">
            <div class="stat">
                <div class="number" style="color:#ff0000">1,710,000</div>
                <div class="label">👥 Subscribers</div>
            </div>
            <div class="stat">
                <div class="number" style="color:#ff0000">1,271,292,845</div>
                <div class="label">👀 Total Views</div>
            </div>
            <div class="stat">
                <div class="number" style="color:#ff0000">1403</div>
                <div class="label">🎥 Videos</div>
            </div>
        </div>
    </div>
    
    
    <div class="channel-card">
        <h2 style="color:#ff6600">Damon Dylan</h2>
        <div class="stats-grid">
            <div class="stat">
                <div class="number" style="color:#ff6600">339,000</div>
                <div class="label">👥 Subscribers</div>
            </div>
            <div class="stat">
                <div class="number" style="color:#ff6600">435,784,183</div>
                <div class="label">👀 Total Views</div>
            </div>
            <div class="stat">
                <div class="number" style="color:#ff6600">1136</div>
                <div class="label">🎥 Videos</div>
            </div>
        </div>
    </div>
    
</body>
</html>
